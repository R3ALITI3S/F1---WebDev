<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>F1 Leaderboard</title>
    <link rel="stylesheet" href="static/DataStyle.css">
</head>


<body>
<header class="navbar">
    <div class="logo">
        <a href="/">F1 STATS!</a>
    </div>

    <nav>
        <a href="/datapage.html">New Race Session</a>
        <a href="#">Current Race Session</a>
        <a href="/drivers">Drivers</a>
        <a href="/teams">Teams</a>
        <a href="#">Calendar</a>
    </nav>

    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>F1 Leaderboard</title>
    <link rel="stylesheet" href="static/DataStyle.css">
</header>

<div class="container">
    <h1>🏁 F1 Global Leaderboard with Custom Input</h1>

    <section class="input-section">
        <h3>Add Your Entry</h3>
        <input type="text" id="userName" placeholder="Your Name">
        <input type="text" id="userTeam" placeholder="Your Team">
        <input type="text" id="userTime" placeholder="Lap Time (e.g. 1:32.450)">
        <button onclick="submitTime()">Submit Result</button>
    </section>

    <div class="search-bar">
        <input type="number" id="seasonInput" value="2026">
        <select id="raceInput">
            <option value="Australia">1. Australia</option>
            <option value="China">2. China</option>
            <option value="Japan">3. Japan</option>
            <option value="Bahrain">4. Bahrain</option>
        </select>
        <button onclick="loadResults()">Search Session</button>
    </div>

    <h2 class="section-title">🏆 Race Classification </h2>
    <table id="finishTable">
        <thead>
            <tr>
                <th>Pos</th>
                <th>Driver</th>
                <th>Team</th>
                <th>Time</th>
                <th>Gap</th>
            </tr>
        </thead>
        <tbody></tbody>
    </table>

    <h2 class="section-title">⚡ Fastest Lap Ranking (Combined)</h2>
    <table id="fastestTable">
        <thead>
            <tr>
                <th>Pos</th>
                <th>Driver</th>
                <th>Team</th>
                <th>Lap Time</th>
                <th>Gap</th>
                <th>Action</th>
            </tr>
        </thead>
        <tbody></tbody>
    </table>
</div>

<script src="static/DataScript.js"></script>
</body>
</html>
