<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>F1 Leaderboard</title>
    <link rel="stylesheet" href="/static/DataStyle.css">
    <script defer src="/static/scripts.js"></script>
    <script>
        if (localStorage.getItem("theme") === "light") {
            document.documentElement.classList.add("light-mode");
        }
    </script>
    <script crossorigin src="https://unpkg.com/react@18/umd/react.production.min.js"></script>
    <script crossorigin src="https://unpkg.com/react-dom@18/umd/react-dom.production.min.js"></script>
    <script defer src="/static/theme-toggle.js"></script>
</head>


<body class="dark-mode">
<header class="navbar">
    <div class="logo">
        <a href="{{ url_for('home') }}">
            <img src="/static/Img/F1.avif" alt="Driver">
        </a>
    </div>
    <nav>
        <a href="/data">Standings</a>
        <a href="/drivers">Drivers</a>
        <a href="/Calendar">Calendar</a>
        <div id="theme-toggle-root"></div>
    </nav>
</header>

    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>F1 Leaderboard</title>

</header>

<div class="container">
    <h1>F1 Leaderboard with Your own data Input 🏁</h1>
    <h2>Input your own data and see where you score!</h2>

    <section class="input-section">
        <h3>Add Your Entry</h3>
        <input type="text" id="userName" placeholder="Your Name">
        <input type="text" id="userTeam" placeholder="Your Team">
        <input type="text" id="userTime" placeholder="Lap Time (e.g. 1:32.450)">
        <button onclick="submitTime()">Submit Result</button>
    </section>

    <div class="search-bar">
        <input type="number" id="seasonInput" value="2026">
        <select id="raceInput">
            <option value="Australia">1. Australia</option>
            <option value="China">2. China</option>
            <option value="Japan">3. Japan</option>
            <option value="Bahrain">4. Bahrain</option>
        </select>
        <button onclick="loadResults()">Search Session</button>
    </div>

    <h2 class="section-title">Race leaderboard 🏆</h2>
    <table id="finishTable">
        <thead>
            <tr>
                <th>Pos</th>
                <th>Driver</th>
                <th>Team</th>
                <th>Time</th>
                <th>Gap</th>
            </tr>
        </thead>
        <tbody></tbody>
    </table>

    <h2 class="section-title">Individual Fastest Lap times ⚡</h2>
    <table id="fastestTable">
        <thead>
            <tr>
                <th>Pos</th>
                <th>Driver</th>
                <th>Team</th>
                <th>Lap Time</th>
                <th>Gap</th>
                <th>Action</th>
            </tr>
        </thead>
        <tbody></tbody>
    </table>
</div>

<script src="/static/DataScript.js"></script>
</body>
</html>
