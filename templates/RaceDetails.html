<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <title>{{ race.name if race else "Race" }}</title>
  <link rel="stylesheet" href="{{ url_for('static', filename='Schedule.css') }}">
  <script>
      if (localStorage.getItem("theme") === "light") {
          document.documentElement.classList.add("light-mode");
      }
  </script>
  <script crossorigin src="https://unpkg.com/react@18/umd/react.production.min.js"></script>
  <script crossorigin src="https://unpkg.com/react-dom@18/umd/react-dom.production.min.js"></script>
  <script defer src="{{ url_for('static', filename='theme-toggle.js') }}"></script>
</head>

<body class="dark-mode">
  <div class="navbar">
    <a href="{{ url_for('schedule_page') }}">Back to schedule</a>
    <div id="theme-toggle-root"></div>
  </div>

  {% if race %}
  <div class="race-details">
    <img
      class="flag-large"
      src="https://flagcdn.com/w80/{{ race.country_code }}.png"
      alt="{{ race.country }} flag"
    />

    <h1>{{ race.name }}</h1>

    <div class="details-row">
      <span class="label">Round:</span>
      <span>{{ race.round }}</span>
    </div>

    <div class="details-row">
      <span class="label">Location:</span>
      <span>{{ race.location }}</span>
    </div>

    <div class="details-row">
      <span class="label">Country:</span>
      <span>{{ race.country }}</span>
    </div>

    <div class="details-row">
      <span class="label">Date:</span>
      <span>{{ race.date }}</span>
    </div>
  </div>
  {% else %}
    <h2>Race not found</h2>
  {% endif %}
</body>
</html>
