<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <title>F1 Schedule</title>

    <style>
        body {
            font-family: Arial, sans-serif;
            background: #111;
            color: white;
            padding: 20px;
        }

        #schedule {
            display: flex;
            flex-direction: column;
            gap: 12px;
        }

        .race-card {
            background: #1e1e1e;
            padding: 15px;
            border-radius: 10px;
            border-left: 5px solid red;
        }

        .race-title {
            font-size: 18px;
            font-weight: bold;
        }

        .race-meta {
            opacity: 0.8;
            margin-top: 5px;
            font-size: 14px;
        }

        .error {
            color: red;
        }
    </style>
</head>

<body>

<h2>🏎️ F1 Schedule</h2>

<div id="schedule">Loading schedule...</div>

<script>
async function loadF1Schedule() {
    const container = document.getElementById("schedule");

    try {
        const response = await fetch("http://localhost:5000/f1-schedule");

        if (!response.ok) {
            throw new Error("Server returned " + response.status);
        }

        const data = await response.json();

        container.innerHTML = ""; // clear "Loading..."

        if (!data || data.length === 0) {
            container.innerHTML = "No schedule data found.";
            return;
        }

        data.forEach(event => {
            const div = document.createElement("div");
            div.className = "race-card";

            const cleanDate = event.date ? event.date.split(" ")[0] : "Unknown date";

            div.innerHTML = `
                <div class="race-title">${event.name}</div>
                <div class="race-meta">
                    ${event.country} • Round ${event.round} • ${cleanDate}
                </div>
            `;

            container.appendChild(div);
        });

    } catch (error) {
        console.error(error);
        container.innerHTML = "<div class='error'>Failed to load F1 schedule. Check console.</div>";
    }
}

loadF1Schedule();
</script>

</body>
</html>
